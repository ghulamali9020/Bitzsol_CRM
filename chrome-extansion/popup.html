<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitzsol CRM</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .header {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header h1 {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.3px;
      }

      .header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }

      .body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Profile card — hidden until data loads */
      #profile-card {
        display: none;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 12px;
        gap: 6px;
        flex-direction: column;
      }

      #profile-card.visible {
        display: flex;
      }

      .field-label {
        font-size: 10px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-top: 4px;
      }

      .field-label:first-child {
        margin-top: 0;
      }

      .field-input {
        width: 100%;
        padding: 6px 8px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 12px;
        outline: none;
      }

      .field-input:focus {
        border-color: #3b82f6;
      }

      .field-input::placeholder {
        color: #475569;
      }

      #profile-name {
        font-size: 13px;
        font-weight: 600;
      }

      /* Status / log area */
      #status {
        font-size: 12px;
        color: #94a3b8;
        min-height: 18px;
        text-align: center;
      }

      #status.error {
        color: #f87171;
      }
      #status.success {
        color: #22c55e;
      }
      #status.loading {
        color: #facc15;
      }

      /* Buttons */
      .button-row {
        display: flex;
        gap: 8px;
      }

      #syncBtn,
      #copyBtn {
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }

      #syncBtn {
        flex: 1;
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
      }

      #copyBtn {
        flex: 0 0 auto;
        padding-left: 14px;
        padding-right: 14px;
        background: #1e293b;
        border: 1px solid #334155;
        color: #e2e8f0;
      }

      #copyBtn:hover:not(:disabled) {
        background: #263349;
      }

      #syncBtn:hover:not(:disabled) {
        opacity: 0.9;
      }
      #syncBtn:active:not(:disabled),
      #copyBtn:active:not(:disabled) {
        transform: scale(0.98);
      }
      #syncBtn:disabled,
      #copyBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Pipeline selector */
      #pipelineId,
      #pipelineSelect {
        width: 100%;
        padding: 8px 10px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 13px;
        outline: none;
      }

      #pipelineId:focus,
      #pipelineSelect:focus {
        border-color: #3b82f6;
      }

      #pipelineSelect option {
        background: #1e293b;
      }

      label {
        font-size: 11px;
        color: #64748b;
        margin-bottom: -6px;
      }

      .hint {
        font-size: 11px;
        color: #475569;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="dot"></div>
      <h1>Bitzsol CRM</h1>
    </div>

    <div class="body">
      <!-- Profile preview (shown after scraping, before sync) — every field
           is editable so a bad scrape can be corrected before syncing. -->
      <div id="profile-card">
        <label class="field-label" for="profile-name">Name</label>
        <input id="profile-name" class="field-input" type="text" placeholder="Full name" />

        <label class="field-label" for="profile-headline">Headline / Job Title</label>
        <input id="profile-headline" class="field-input" type="text" placeholder="Headline" />

        <label class="field-label" for="profile-company">Company</label>
        <input id="profile-company" class="field-input" type="text" placeholder="Company" />

        <label class="field-label" for="profile-location">Location</label>
        <input id="profile-location" class="field-input" type="text" placeholder="Location" />

        <label class="field-label" for="profile-email">Email</label>
        <input id="profile-email" class="field-input" type="text" placeholder="Email" />

        <label class="field-label" for="profile-phone">Phone</label>
        <input id="profile-phone" class="field-input" type="text" placeholder="Phone" />

        <label class="field-label" for="profile-url">Profile URL</label>
        <input id="profile-url" class="field-input" type="text" placeholder="Profile URL" />
      </div>

      <!-- Status / log line -->
      <div id="status">Open a LinkedIn, Upwork, or Fiverr profile to sync</div>

      <!-- Pipeline selector -->
      <label for="pipelineSelect">Pipeline</label>
      <select id="pipelineSelect">
        <option value="">Loading pipelines…</option>
      </select>

      <!-- Copy + Sync -->
      <div class="button-row">
        <button id="copyBtn" type="button" disabled>Copy</button>
        <button id="syncBtn" disabled>Sync Lead</button>
      </div>

      <div class="hint">
        Works on linkedin.com/in/…, upwork.com/freelancers/…, or fiverr.com/…
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
